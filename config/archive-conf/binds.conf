# Default programs
$terminal = kitty
$fileManager = thunar 
$menu = rofi -show drun 
$browser = firefox
$mailClient = betterbird
$messagingClient =  vesktop
$systemMonitor = btop # This only works with non-graphical system monitors 

$mainMod = SUPER # Sets "Windows" key as main modifier

# Launching Default programs 
bind = $mainMod, B, exec, $browser
bind = $mainMod, return, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, space, exec, $menu 
bind = $mainMod, G, exec, sh -c "hyprctl clients | grep -q '$mailClient' && hyprctl dispatch togglespecialworkspace mail || $mailClient"
bind = $mainMod, M, exec, sh -c "hyprctl clients | grep -q 'system-monitor' && hyprctl dispatch togglespecialworkspace sysmon || $terminal --class system-monitor $systemMonitor"
bind = $mainMod, V, exec, sh -c "hyprctl clients | grep -q '$messagingClient' && hyprctl dispatch togglespecialworkspace messaging || $messagingClient"

# Miscellaneous programs + scripts
bind = $mainMod SHIFT, P, exec, hyprpicker -a
bind = $mainMod SHIFT, M, exec, hyprshutdown  
bind = $mainMod, PRINT, exec, hyprshot -m region -o ~/Screenshots # Screenshot region of a screen
bind = $mainMod SHIFT, PRINT, exec, hyprshot -m output -o ~/Screenshots # Screenshot entire screen
bind = $mainMod SHIFT, R, exec, ~/.config/waybar/scripts/killwaybar.sh # Kill waybar
bind = $mainMod, R, exec, ~/.config/waybar/scripts/startwaybar.sh # Restart waybar
bind = $mainMod, W, exec, ~/.config/wallust/scripts/wallust-sync.sh # Temporary (setup to change whenever wallpaper changes)

# Window managing
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Q, forcekillactive,
bind = $mainMod SHIFT, space, togglefloating
bind = $mainMod SHIFT, F, fullscreen
bind = $mainMod, F, fullscreenstate, 0 2

# Drag windows by holding $mainMod
bindm= $mainMod, mouse:272, movewindow

# Move focus with mainMod with vim bindings 
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Move windows with mainMod + shift with vim bindings
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

# Resize windows with mainMod + shift with vim bindings
bind = $mainMod CTRL, h, resizeactive, -10 0
bind = $mainMod CTRL, l, resizeactive, 10 0
bind = $mainMod CTRL, k, resizeactive, 0 10
bind = $mainMod CTRL, j, resizeactive, 0 -10

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1 
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2 
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4 
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5 
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6 
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7 
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Brightness and Volume controls
bind = ,XF86AudioLowerVolume, exec, pactl -- set-sink-volume 0 -5%
bind = ,XF86AudioRaiseVolume, exec, pactl -- set-sink-volume 0 +5%
bind = ,XF86AudioMute, exec, pactl -- set-sink-mute 0 toggle
bind = ,XF86AudioMicMute, exec, pactl -- set-source-mute 0 toggle
bind = ,XF86AudioMicMute, exec, dunst -config ~/.config/dunst/dunstmic -print "Microphone Muted" 
bind = ,XF86MonBrightnessDown, exec, brightnessctl s 5%-
bind = ,XF86MonBrightnessUp, exec, brightnessctl s +5%
bind = $mainMod,XF86MonBrightnessUp, exec, hyprctl hyprsunset temperature +300 # Increase temperature
bind = $mainMod,XF86MonBrightnessDown, exec, hyprctl hyprsunset temperature -300 # Decrease temperature
bind = $mainMod SHIFT, N, exec, hyprctl hyprsunset temperature 2500 # Turn on blue-light filter
bind = $mainMod, N, exec, hyprctl hyprsunset identity # Turn off blue-light filter 
