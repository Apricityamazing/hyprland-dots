
background {
    monitor =
    path = /home/apricity/Pictures/Wallpapers/tokyonight-japan.png
    color = rgba(25, 20, 20, 1.0)
    blur_size = 3
    blur_passes = 1
    noise = 0.0117
    contrast = 1.3000
    brightness = 0.8000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}

label {
    monitor =
    text = $USER
    color = rgba(200, 200, 200, 1.0)
    font_size = 25
    font_family = Inter
    position = 0, 80
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.0)
  
    outer_color = rgba(7aa2f7ee) rgba(ff899dee) 135deg
    check_color = rgba(9ece6aee) rgba(9fe044ee) 120deg
    fail_color  = rgba(db4b4bee) rgba(f7768eee) 40deg

    font_color = rgb(143, 143, 143)
    fade_on_empty = false
    rounding = 15

    position = 0, -20
    halign = center
    valign = center
}

